<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>موقع ألعاب المتصفح 🎮</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
        }
        h1 {
            margin-top: 20px;
        }
        .game-container {
            margin: 20px auto;
            width: 800px;
            max-width: 100%;
            border: 2px solid #ccc;
            background-color: white;
            padding: 10px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }
        iframe {
            width: 100%;
            height: 500px;
        }
    </style>
</head>
<body>
    <h1>مرحبا في موقع الألعاب 🎮</h1>

    <!-- Subway Runner -->
    <div class="game-container">
        <h2>Subway Runner</h2>
        <iframe src="https://itch.io/embed/462092?border_width=0" allowfullscreen></iframe>
    </div>

    <!-- 2D Fighting Game -->
    <div class="game-container">
        <h2>2D Fighting Arena</h2>
        <iframe src="https://itch.io/embed/552805?border_width=0" allowfullscreen></iframe>
    </div>

    <!-- 2D Car Racing -->
    <div class="game-container">
        <h2>Car Racing 2D</h2>
        <iframe src="https://itch.io/embed/454323?border_width=0" allowfullscreen></iframe>
    </div>

    <!-- 3D Car Racing -->
    <div class="game-container">
        <h2>Car Racing 3D</h2>
        <iframe src="https://itch.io/embed/556789?border_width=0" allowfullscreen></iframe>
    </div>

    <!-- Shooting Game -->
    <div class="game-container">
        <h2>Shooting Combat</h2>
        <iframe src="https://itch.io/embed/789012?border_width=0" allowfullscreen></iframe>
    </div>

    <!-- Soccer Game -->
    <div class="game-container">
        <h2>Soccer Fun</h2>
        <iframe src="https://itch.io/embed/224974?border_width=0" allowfullscreen></iframe>
    </div>

    <!-- Basketball Game -->
    <div class="game-container">
        <h2>Basketball Arcade</h2>
        <iframe src="https://itch.io/embed/332211?border_width=0" allowfullscreen></iframe>
    </div>

    <p>🎮 جميع الألعاب مجانية للعب مباشرة في المتصفح!</p>
</body>
</html>
