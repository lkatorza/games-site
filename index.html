<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Games 🎮</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f0f0f0;
}

/* MENU */
.navbar{
    background:#222;
    padding:15px;
    text-align:center;
}

.navbar a{
    color:white;
    margin:15px;
    text-decoration:none;
    font-size:18px;
}

.navbar a:hover{
    color:orange;
}

/* TITLE */
h1{
    text-align:center;
    margin:20px;
}

/* GAME BOX */
.game-box{
    width:900px;
    max-width:95%;
    margin:20px auto;
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

iframe{
    width:100%;
    height:500px;
    border:none;
}

</style>
</head>

<body>

<!-- MENU -->
<div class="navbar">
<a href="#">Home</a>
<a href="#">Car</a>
<a href="#">Soccer</a>
<a href="#">Basketball</a>
<a href="#">Fighting</a>
<a href="#">Shooting</a>
</div>

<h1>🎮 مرحبا في موقع الألعاب</h1>

<!-- GAME -->
<div class="game-box">

<h2>🚗 لعبة السيارات</h2>

<!-- HTML5 Game Iframe Embed Code – START -->
<div class="madkidgames-embed" style="max-width:960px;margin:0 auto;">

  <!-- Game iframe -->
  <iframe
    src="https://www.madkidgames.com/full/ultimate-car-driving-simulator"
    width="100%"
    height="540"
    frameborder="0"
    allowfullscreen
    scrolling="no"
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>

  <!-- Attribution -->
  <p class="game-credit" style="margin:8px 0 0;font-size:13px;line-height:1.4;text-align:center;">
    <a href="https://www.madkidgames.com/game/ultimate-car-driving-simulator" target="_blank" rel="noopener noreferrer">Play Ultimate Car Driving Simulator</a>
  </p>

  <!-- Fallback for crawlers / no-JS -->
  <noscript>
    <p style="text-align:center;font-size:13px;">
      <a href="https://www.madkidgames.com/game/ultimate-car-driving-simulator">Play Ultimate Car Driving Simulator</a>
    </p>
  </noscript>

</div>
<!-- HTML5 Game Iframe Embed Code – END -->

</div>

</body>
</html>
